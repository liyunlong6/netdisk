server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/netdisk?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 1GB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.netdisk.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: netdisk-secret-key-change-in-production
  expiration: 7200000  # 2 hours
  refresh-expiration: 604800000  # 7 days

storage:
  local:
    path: ./uploads
    max-size-gb: 10
